name: travel_companion
description: "Never miss your stop again — sleep worry-free on Indian trains."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

platforms:
  android:
  ios:

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Database
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  path: ^1.9.1

  # Location
  geolocator: ^13.0.2
  flutter_background_service: ^5.0.12

  # Notifications & Alarms
  flutter_local_notifications: ^18.0.1
  android_alarm_manager_plus: ^4.0.6
  just_audio: ^0.9.43

  # Permissions
  permission_handler: ^11.3.1

  # HTTP
  dio: ^5.7.0

  # Map
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Utilities
  intl: ^0.19.0
  shared_preferences: ^2.3.4
  uuid: ^4.5.1
  equatable: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.14

flutter:
  uses-material-design: true

  assets:
    - assets/db/
    - assets/sounds/
    - assets/images/
